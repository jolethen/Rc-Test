<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Mission Control v1.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon-green: #00ff41; --danger-red: #ff3131; }
        body { background: #050505; color: var(--neon-green); font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #header { width: 100%; padding: 10px; border-bottom: 1px solid var(--neon-green); text-align: center; background: #000; box-shadow: 0 0 10px var(--neon-green); }
        
        #main-view { position: relative; width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #111; border: 2px solid var(--neon-green); margin: 20px 0; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.1); }
        
        #hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .waypoint { position: absolute; width: 30px; height: 30px; border: 3px solid var(--danger-red); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--danger-red); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        #controls { width: 90%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .panel { background: #111; border: 1px solid var(--neon-green); padding: 15px; text-align: center; }
        
        button { background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 10px; cursor: pointer; font-family: inherit; width: 100%; transition: 0.3s; }
        button:hover { background: var(--neon-green); color: #000; }

        #map-area { background: #1a1a1a; position: relative; border: 1px dashed var(--neon-green); height: 150px; cursor: crosshair; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #map-img { max-width: 100%; max-height: 100%; pointer-events: none; opacity: 0.5; }
        #status-bar { font-size: 12px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div id="header">
    <strong>[ MISSION CONTROL SYSTEM ]</strong>
</div>

<div id="main-view">
    <video id="remoteVideo" autoplay playsinline muted></video>
    <div id="hud-overlay"></div>
</div>

<div id="controls">
    <div class="panel">
        <h3>STEP 1: CAR MODE</h3>
        <p style="font-size: 11px;">(Phone on RC Car)</p>
        <button onclick="startCar()">INITIATE CAR FEED</button>
    </div>
    <div class="panel">
        <h3>STEP 2: OPERATOR</h3>
        <p style="font-size: 11px;">(Laptop on Desk)</p>
        <button onclick="startOperator()">CONNECT TO CAR</button>
    </div>
</div>

<div class="panel" style="width: 85%; max-width: 770px;">
    <h3>TACTICAL MAP / WAYPOINTS</h3>
    <input type="file" id="mapUploader" accept="image/*" style="margin-bottom:10px; font-size:10px;">
    <div id="map-area" onclick="handleMapClick(event)">
        <img id="map-img" src="" alt="Upload a house map">
        <p id="map-placeholder" style="position:absolute;">UPLOAD MAP TO BEGIN</p>
    </div>
    <div id="status-bar">SYSTEM STATUS: STANDBY...</div>
</div>

<script>
    // --- SETTINGS ---
    const SECRET_ID = 'lucknow-rc-explorer-2026'; // Change this to your secret name
    let peer, conn, localStream;

    const statusEl = document.getElementById('status-bar');
    const hud = document.getElementById('hud-overlay');
    const mapImg = document.getElementById('map-img');
    const mapPlaceholder = document.getElementById('map-placeholder');

    // --- CAR LOGIC (PHONE) ---
    async function startCar() {
        statusEl.innerText = "STATUS: INITIALIZING CAMERA...";
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            document.getElementById('remoteVideo').srcObject = localStream;
            
            peer = new Peer(SECRET_ID);
            peer.on('open', (id) => {
                statusEl.innerText = "STATUS: CAR LIVE. WAITING FOR OPERATOR...";
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                statusEl.innerText = "STATUS: STREAMING LIVE TO OPERATOR";
            });

            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', (data) => {
                    if (data.type === 'WAYPOINT') triggerWaypoint(data.x, data.y);
                });
            });
        } catch (err) {
            statusEl.innerText = "ERROR: CAMERA ACCESS DENIED";
            console.error(err);
        }
    }

    // --- OPERATOR LOGIC (LAPTOP) ---
    function startOperator() {
        statusEl.innerText = "STATUS: CONNECTING TO CAR...";
        peer = new Peer(); // Random ID for Operator
        
        peer.on('open', () => {
            // 1. Data Connection (for Waypoints)
            conn = peer.connect(SECRET_ID);
            
            // 2. Video Connection (to Receive)
            const call = peer.call(SECRET_ID, null); 
            call.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                statusEl.innerText = "STATUS: CONNECTED. RECEIVING DATA.";
            });
        });
    }

    // --- WAYPOINT LOGIC ---
    function handleMapClick(e) {
        if (!conn || !conn.open) return;
        
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        conn.send({ type: 'WAYPOINT', x, y });
        statusEl.innerText = `STATUS: WAYPOINT SENT (${Math.round(x)}%, ${Math.round(y)}%)`;
    }

    function triggerWaypoint(x, y) {
        hud.innerHTML = `<div class="waypoint" style="left: ${x}%; top: ${y}%;"></div>`;
        // Auto-clear waypoint after 5 seconds
        setTimeout(() => { hud.innerHTML = ''; }, 5000);
    }

    // --- MAP UPLOADER ---
    document.getElementById('mapUploader').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            mapImg.src = event.target.result;
            mapPlaceholder.style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>

</body>
      </html>
