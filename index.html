<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Mission Control v2.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon-green: #00ff41; --danger-red: #ff3131; --panel-bg: #111; }
        body { background: #050505; color: var(--neon-green); font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #header { width: 100%; padding: 10px; border-bottom: 1px solid var(--neon-green); text-align: center; background: #000; box-shadow: 0 0 10px var(--neon-green); }
        
        #main-view { position: relative; width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #111; border: 2px solid var(--neon-green); margin: 20px 0; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.1); }
        
        #hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .waypoint { position: absolute; width: 30px; height: 30px; border: 3px solid var(--danger-red); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--danger-red); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        #setup-bar { width: 90%; max-width: 800px; background: var(--panel-bg); border: 1px solid var(--neon-green); padding: 10px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { background: #000; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 5px; font-family: inherit; flex-grow: 1; }

        #controls { width: 90%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .panel { background: var(--panel-bg); border: 1px solid var(--neon-green); padding: 15px; text-align: center; }
        
        button { background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 10px; cursor: pointer; font-family: inherit; width: 100%; transition: 0.3s; margin-top: 5px; }
        button:hover { background: var(--neon-green); color: #000; }
        button.active { background: var(--danger-red); color: white; border-color: white; }

        #status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
        .online { background: var(--neon-green) !important; box-shadow: 0 0 8px var(--neon-green); }

        #map-area { background: #1a1a1a; position: relative; border: 1px dashed var(--neon-green); height: 150px; cursor: crosshair; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #map-img { max-width: 100%; max-height: 100%; pointer-events: none; opacity: 0.5; }
        #status-bar { font-size: 12px; margin-top: 10px; color: #aaa; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="header">
    <strong>[ MISSION CONTROL v2.1 ]</strong>
</div>

<div id="main-view">
    <video id="remoteVideo" autoplay playsinline muted></video>
    <div id="hud-overlay"></div>
</div>

<div id="setup-bar">
    <div id="status-indicator"></div>
    <span>CAR_ID:</span>
    <input type="text" id="carIdInput" placeholder="Enter secret Mission-ID">
    <button onclick="saveId()" style="width: auto;">SAVE</button>
</div>

<div id="controls">
    <div class="panel">
        <h3>CAR MODE</h3>
        <button onclick="startCar()">INITIATE CAR FEED</button>
        <button id="camToggle" class="hidden" onclick="toggleCam()">DISABLE CAMERA</button>
    </div>
    <div class="panel">
        <h3>OPERATOR</h3>
        <button onclick="startOperator()">CONNECT TO CAR</button>
    </div>
</div>

<div class="panel" style="width: 85%; max-width: 770px;">
    <h3>TACTICAL MAP</h3>
    <input type="file" id="mapUploader" accept="image/*" style="margin-bottom:10px; font-size:10px;">
    <div id="map-area" onclick="handleMapClick(event)">
        <img id="map-img" src="" alt="Map Area">
        <p id="map-placeholder" style="position:absolute;">UPLOAD MAP TO BEGIN</p>
    </div>
    <div id="status-bar">SYSTEM STATUS: READY TO INITIALIZE...</div>
</div>

<script>
    let peer, conn, localStream;
    let camEnabled = true;

    // Google's STUN servers to help bypass firewalls
    const peerConfig = {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    };

    const statusEl = document.getElementById('status-bar');
    const indicator = document.getElementById('status-indicator');
    const hud = document.getElementById('hud-overlay');
    const mapImg = document.getElementById('map-img');
    const carIdInput = document.getElementById('carIdInput');
    const camBtn = document.getElementById('camToggle');

    window.onload = () => {
        const savedId = localStorage.getItem('rc_car_id');
        if (savedId) carIdInput.value = savedId;
    };

    function saveId() {
        localStorage.setItem('rc_car_id', carIdInput.value);
        alert("ID Saved Locally!");
    }

    function getSecretId() {
        return carIdInput.value || 'default-rc-id';
    }

    // --- CAR LOGIC ---
    async function startCar() {
        const SECRET_ID = getSecretId();
        statusEl.innerText = "STATUS: ACCESSING CAMERA...";
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            document.getElementById('remoteVideo').srcObject = localStream;
            camBtn.classList.remove('hidden');

            peer = new Peer(SECRET_ID, peerConfig);
            
            peer.on('open', (id) => {
                indicator.classList.add('online');
                statusEl.innerText = `STATUS: CAR LIVE (ID: ${id}). WAITING FOR OPERATOR...`;
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                statusEl.innerText = "STATUS: OPERATOR CONNECTED - STREAMING";
            });

            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', (data) => {
                    if (data.type === 'WAYPOINT') triggerWaypoint(data.x, data.y);
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'unavailable-id') alert("Error: This ID is already in use by another tab!");
            });

        } catch (err) {
            statusEl.innerText = "ERROR: CAMERA DENIED";
        }
    }

    // --- OPERATOR LOGIC ---
    function startOperator() {
        const SECRET_ID = getSecretId();
        statusEl.innerText = "STATUS: ATTEMPTING HANDSHAKE...";
        peer = new Peer(peerConfig); 
        
        peer.on('open', (id) => {
            indicator.classList.add('online');
            // Data channel
            conn = peer.connect(SECRET_ID);
            
            // Video channel
            const call = peer.call(SECRET_ID, null); 
            call.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                statusEl.innerText = "STATUS: CONNECTION ESTABLISHED. RECEIVING FEED.";
            });

            conn.on('open', () => { console.log("Data connection open"); });
        });

        peer.on('error', (err) => {
            statusEl.innerText = "ERROR: UNABLE TO FIND CAR";
        });
    }

    function toggleCam() {
        if (!localStream) return;
        camEnabled = !camEnabled;
        localStream.getVideoTracks()[0].enabled = camEnabled;
        camBtn.innerText = camEnabled ? "DISABLE CAMERA" : "ENABLE CAMERA";
        camBtn.classList.toggle('active', !camEnabled);
    }

    function handleMapClick(e) {
        if (!conn || !conn.open) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        conn.send({ type: 'WAYPOINT', x, y });
    }

    function triggerWaypoint(x, y) {
        hud.innerHTML = `<div class="waypoint" style="left: ${x}%; top: ${y}%;"></div>`;
        setTimeout(() => { hud.innerHTML = ''; }, 5000);
    }

    document.getElementById('mapUploader').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            mapImg.src = event.target.result;
            document.getElementById('map-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
